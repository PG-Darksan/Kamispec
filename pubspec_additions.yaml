# pubspec.yaml の dependencies に以下を追加してください:
#
#   firebase_core: ^3.6.0
#   firebase_auth: ^5.3.0
#   cloud_firestore: ^5.4.0
#
# 追加後に以下を実行:
#   flutter pub get
#   flutterfire configure
#     → Firebaseプロジェクトを選択すると lib/firebase_options.dart が自動生成されます
#
# Firestore のセキュリティルール（Firebase Console > Firestore > ルール）:
#
# rules_version = '2';
# service cloud.firestore {
#   match /databases/{database}/documents {
#     match /users/{userId}/pages/{pageId} {
#       allow read, write: if request.auth != null && request.auth.uid == userId;
#     }
#   }
# }
