name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter pub get

      - name: Create env.json from secrets
        run: |
          cat > env.json << EOF
          {
            "FIREBASE_PROJECT_ID": "${{ secrets.FIREBASE_PROJECT_ID }}",
            "FIREBASE_MESSAGING_SENDER_ID": "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            "FIREBASE_STORAGE_BUCKET": "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            "FIREBASE_AUTH_DOMAIN": "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            "FIREBASE_API_KEY_ANDROID": "${{ secrets.FIREBASE_API_KEY_ANDROID }}",
            "FIREBASE_APP_ID_ANDROID": "${{ secrets.FIREBASE_APP_ID_ANDROID }}",
            "FIREBASE_API_KEY_WINDOWS": "${{ secrets.FIREBASE_API_KEY_WINDOWS }}",
            "FIREBASE_APP_ID_WINDOWS": "${{ secrets.FIREBASE_APP_ID_WINDOWS }}",
            "FIREBASE_MEASUREMENT_ID": "${{ secrets.FIREBASE_MEASUREMENT_ID }}",
            "FIREBASE_API_KEY_REST": "${{ secrets.FIREBASE_API_KEY_REST }}",
            "GEMINI_API_KEY": "${{ secrets.GEMINI_API_KEY }}"
          }
          EOF

      - name: Build APK
        run: flutter build apk --release --dart-define-from-file=env.json

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
